name: Stream 3 — Arbitrage Scanner

on:
  schedule:
    - cron: '0 8 * * *'   # 8am
    - cron: '0 12 * * *'  # 12pm
    - cron: '0 16 * * *'  # 4pm
    - cron: '0 20 * * *'  # 8pm
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      deal_id:
        description: 'Create listing for specific deal ID'
        required: false
        default: ''

jobs:
  run-arbitrage-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt
      - name: Run arbitrage scanner
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_DEV_ID: ${{ secrets.EBAY_DEV_ID }}
          EBAY_USER_TOKEN: ${{ secrets.EBAY_USER_TOKEN }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${{ inputs.deal_id }}" ]; then
            # Create listing for approved deal
            FLAGS=""
            [ "${{ inputs.dry_run }}" = "true" ] && FLAGS="--dry-run"
            python stream3_arbitrage/listing_creator.py --deal-id "${{ inputs.deal_id }}" $FLAGS
          else
            FLAGS=""
            [ "${{ inputs.dry_run }}" = "true" ] && FLAGS="--dry-run"
            python stream3_arbitrage/scanner.py $FLAGS
          fi
