name: Stream 1 — Product Factory

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 6:00am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publishing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      niche:
        description: 'Override niche (optional)'
        required: false
        default: ''

jobs:
  run-product-factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run product factory
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          NICHE_FLAG=""
          if [ -n "${{ inputs.niche }}" ]; then
            NICHE_FLAG="--niche '${{ inputs.niche }}'"
          fi
          python stream1_digital/product_factory.py $DRY_RUN_FLAG $NICHE_FLAG
