name: Stream 1 — Pinterest Publisher

on:
  schedule:
    - cron: '15 6 * * *'  # Daily 6:15am UTC (after product_factory)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      repin:
        description: 'Re-pin top performers to seasonal boards'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  run-pinterest-publisher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt
      - name: Run Pinterest publisher
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FLAGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && FLAGS="$FLAGS --dry-run"
          [ "${{ inputs.repin }}" = "true" ] && FLAGS="$FLAGS --repin"
          python stream1_digital/pinterest_publisher.py $FLAGS
