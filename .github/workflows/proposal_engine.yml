name: Stream 2 — Proposal Engine

on:
  schedule:
    - cron: '0 9 * * *'   # 9am UTC
    - cron: '0 14 * * *'  # 2pm UTC
    - cron: '0 18 * * *'  # 6pm UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      include_social:
        description: 'Run social outreach'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  run-proposal-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt
      - name: Run job scraper and proposal writer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          FLAGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && FLAGS="--dry-run"
          python stream2_freelance/job_scraper.py $FLAGS

          # Check throttle flag
          if [ ! -f "shared/throttle_proposals.flag" ]; then
            if [ "${{ inputs.include_social }}" != "false" ]; then
              python stream2_freelance/social_outreach.py $FLAGS
            fi
          else
            echo "Proposal engine throttled by tier_monitor — skipping social outreach"
          fi
